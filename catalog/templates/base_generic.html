<!DOCTYPE html>
<html lang="es">
<head>
  {% block title %}<title>Local Library</title>{% endblock %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>
  <div class="container-fluid">
    <div class="row min-vh-100">
      <!-- Sidebar -->
      <div class="col-sm-3 col-md-2 bg-light border-end py-4">
        {% block sidebar %}
        <nav class="nav flex-column">
          <h5 class="px-3 mb-3">Menú</h5>
          <a class="nav-link border-bottom" href="{% url 'index' %}">Inicio</a>
          <a class="nav-link border-bottom" href="{% url 'books' %}">Libros</a>
          <a class="nav-link border-bottom" href="">Autores</a>
          
          <hr>
          
          {% if user.is_authenticated %}
            <span class="nav-link disabled text-muted">Usuario: {{ user.get_username }}</span>
            <a class="nav-link" href="{% url 'my-borrowed' %}">Mis préstamos</a>
            <a class="btn btn-outline-danger btn-sm mx-3 mt-2" href="{% url 'logout'%}?next={{request.path}}">Cerrar sesión</a>
          {% else %}
            <a class="btn btn-primary btn-sm mx-3 mt-2" href="{% url 'login'%}?next={{request.path}}">Iniciar sesión</a>
          {% endif %}
        </nav>
        {% endblock %}
      </div>

      <!-- Main Content -->
      <div class="col-sm-9 col-md-10 py-4 px-4">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
